apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: Loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags: ["service.name", "service", "job"]
      serviceMap:
        datasourceUid: Prometheus

  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
