apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    scrape_configs:
      - job_name: demo
        metrics_path: /actuator/prometheus
        static_configs:
          # Docker Desktop K8s: reach Spring Boot on the host from pods
          - targets: ["host.docker.internal:8080"]
