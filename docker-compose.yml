name: "jenkins"

services:
  jenkins-main:
    container_name: jenkins_main
    image: jenkins/jenkins:2.541.3-lts-jdk17
    privileged: true
    restart: unless-stopped
    hostname: "jenkins-main.example.ru"
    extra_hosts:
      - "jenkins-main.example.ru:172.10.0.2"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - config:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    group_add:
      - "988"
    depends_on:
      - nexus
    networks:
      - ci

  nexus:
    container_name: nexus
    image: sonatype/nexus3:latest
    restart: unless-stopped
    ports:
      - "8081:8081"   # Nexus UI
      - "5000:5000"   # Docker registry (configure docker hosted repo to use 5000)
    volumes:
      - nexus-data:/nexus-data
    networks:
      - ci

volumes:
  config:
  nexus-data:

networks:
  ci:
    driver: bridge
